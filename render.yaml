services:
  - type: web
    name: market-terminal
    env: docker
    dockerfilePath: Dockerfile.production
    plan: free
    region: singapore
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: market-db
          property: connectionString
      - key: REDIS_URL
        fromRedis:
          name: market-redis
          property: connectionString
      - key: GEMINI_API_KEY
        sync: false
      - key: AUTH_SECRET
        generateValue: true
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 8000

databases:
  - name: market-db
    plan: free
    region: singapore

redis:
  - name: market-redis
    plan: free
    region: singapore
