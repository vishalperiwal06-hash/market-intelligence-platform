events {
  worker_connections 1024;
}

http {
  upstream next_app {
    server app:3000;
  }

  upstream realtime_engine {
    server engine:4000;
  }

  upstream nse_data_service {
    server nse-data:8000;
  }

  server {
    listen 80;
    server_name _;

    client_max_body_size 25m;

    location /socket.io/ {
      proxy_pass http://realtime_engine;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
      proxy_set_header Host $host;
      proxy_read_timeout 60s;
      proxy_send_timeout 60s;
    }

    location /engine/ {
      proxy_pass http://realtime_engine/;
      proxy_set_header Host $host;
    }

    location /nse-data/ {
      proxy_pass http://nse_data_service/;
      proxy_set_header Host $host;
    }

    location / {
      proxy_pass http://next_app;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
      proxy_set_header Host $host;
      proxy_cache_bypass $http_upgrade;
    }
  }
}
