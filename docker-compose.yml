services:
  db:
    image: pgvector/pgvector:pg16
    container_name: aibazaar-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: aibazaar
      POSTGRES_USER: aibazaar
      POSTGRES_PASSWORD: changeme_in_production
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aibazaar -d aibazaar"]
      interval: 10s
      timeout: 5s
      retries: 15

  redis:
    image: redis:7-alpine
    container_name: aibazaar-redis
    restart: unless-stopped
    ports:
      - "6379:6379"

  nse-data:
    build:
      context: ./services/nse-data
    container_name: aibazaar-nse-data
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_started
    environment:
      REDIS_URL: redis://redis:6379/0
      KAFKA_ENABLED: "false"
    ports:
      - "8000:8000"

  db-init:
    build:
      context: .
      dockerfile: Dockerfile.engine
    container_name: aibazaar-db-init
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://aibazaar:changeme_in_production@db:5432/aibazaar
      REDIS_URL: redis://redis:6379
      NODE_ENV: production
    command: >
      sh -c "npm run db:init"

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: aibazaar-app
    restart: unless-stopped
    depends_on:
      db-init:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: postgresql://aibazaar:changeme_in_production@db:5432/aibazaar
      REDIS_URL: redis://redis:6379
      OLLAMA_BASE_URL: http://host.docker.internal:11434
      NSE_DATA_SERVICE_URL: http://nse-data:8000
      NODE_ENV: production
    ports:
      - "3000:3000"
    extra_hosts:
      - "host.docker.internal:host-gateway"

  engine:
    build:
      context: .
      dockerfile: Dockerfile.engine
    container_name: aibazaar-engine
    restart: unless-stopped
    depends_on:
      db-init:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: postgresql://aibazaar:changeme_in_production@db:5432/aibazaar
      REDIS_URL: redis://redis:6379
      OLLAMA_BASE_URL: http://host.docker.internal:11434
      NSE_DATA_SERVICE_URL: http://nse-data:8000
      NODE_ENV: production
    ports:
      - "4000:4000"
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  pgdata: